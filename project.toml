[project]
name = "androidaudit"
version = "0.1.0"
description = "Professional Android Penetration Testing Framework"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1.7",
    "rich>=13.7.0",
    "pure-python-adb>=0.3.0.dev0",
    "androguard>=4.1.1",
    "frida>=16.2.1",
    "mitmproxy>=10.2.0",
    "jinja2>=3.1.3",
    "cvss>=3.1",
    "python-dotenv>=1.0.1",
    "pyyaml>=6.0.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true